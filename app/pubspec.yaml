name: quickslot
description: "QuickSlot — Sports slot booking app for the hiring hackathon."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Navigation
  go_router: ^14.6.2

  # Local storage (offline cache)
  shared_preferences: ^2.3.3

  # Image loading
  cached_network_image: ^3.4.1

  # Date formatting
  intl: ^0.19.0

  # Data classes
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true
